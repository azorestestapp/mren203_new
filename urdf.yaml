<?xml version="1.0"?>
<robot name="robot_with_lidar">

<!-- LINK 1: Rectangle base -->
<link name="link1">
  <visual>
    <origin xyz="0 0 0.05" rpy="0 0 0"/>
    <geometry>
      <box size="0.33 0.30 0.1"/>
    </geometry>
    <material name="green">
      <color rgba="0 1 0 1"/>
    </material>
  </visual>
  <collision>
    <origin xyz="0 0 0.05" rpy="0 0 0"/>
    <geometry>
      <box size="0.33 0.30 0.1"/>
    </geometry>
  </collision>
</link>

<!-- LINK 2: LiDAR -->
<link name="lidar_link">
  <visual>
    <origin xyz="0 0 0" rpy="0 0 0"/>
    <geometry>
      <cylinder radius="0.0325" length="0.06"/>
    </geometry>
    <material name="gray">
      <color rgba="0.5 0.5 0.5 1"/>
    </material>
  </visual>
</link>

<!-- Fixed joint attaching LiDAR directly to base with offset -->
<joint name="lidar_joint" type="fixed">
  <parent link="link1"/>
  <child link="lidar_link"/>
  <origin xyz="0.05 0.05 0.4" rpy="0 0 0"/> 
</joint>
